apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ms-sandbox-smsemail
    release: ms-sandbox-smsemail
  name: ms-sandbox-smsemail
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-sandbox-smsemail
      release: ms-sandbox-smsemail
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ms-sandbox-smsemail
        release: ms-sandbox-smsemail
    spec:
      containers:
        - image: xxx.dkr.ecr.eu-west-2.amazonaws.com/backend/xxx:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 1.0
              memory: 4G
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /actuator/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: ms-sandbox-smsemail
          ports:
            - containerPort: 8585
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /actuator/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 40
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: xxx.json
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-secrets
                  key: bot-token
          terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: ms-sandbox-smsemail
    release: ms-sandbox-smsemail
  name: ms-sandbox-smsemail-service
  namespace: backend
spec:
  ports:
    - port: 8585
      protocol: TCP
      targetPort: 8585
  selector:
    app: ms-sandbox-smsemail
    release: ms-sandbox-smsemail
  sessionAffinity: None
  type: ClusterIP
