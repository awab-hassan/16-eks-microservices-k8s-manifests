apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ms-livewebsocket
    release: ms-livewebsocket
  name: ms-livewebsocket
  namespace: backend
spec:
  selector:
    matchLabels:
      app: ms-livewebsocket
      release: ms-livewebsocket
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ms-livewebsocket
        release: ms-livewebsocket
    spec:
      containers:
        - image: xxx:latest
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /actuator/health
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: ms-livewebsocket
          ports:
            - containerPort: 443
              name: server
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /actuator/health
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 115
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
      terminationGracePeriodSeconds: 10
