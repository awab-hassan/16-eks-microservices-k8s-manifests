apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ms-data-migration
    release: ms-data-migration
  name: ms-data-migration
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-data-migration
      release: ms-data-migration
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ms-data-migration
        release: ms-data-migration
    spec:
      containers:
        - image: xxx.dkr.ecr.eu-west-2.amazonaws.com/backend/xxx
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 16.0
              memory: 32G
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /actuator/health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 45
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: ms-data-migration
          ports:
            - containerPort: 443
              name: https
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /actuator/health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 40
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: main/resources/xxx.json
            - name: APP_TEST_ACTIVE_PROFILE
              value: datamigration
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 60" ]
      terminationGracePeriodSeconds: 60
